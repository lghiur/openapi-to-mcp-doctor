# Copy-paste PR workflow for the MCP Doctor action.
#
# `closed` is included so the stacked fix PR (behavior: fix-pr) gets
# re-pointed or closed when the source PR closes. fetch-depth: 0 gives the
# action the base branch it needs for delta gating. The concurrency group
# cancels superseded runs when new pushes land on the same PR.
name: MCP Doctor

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: mcp-doctor-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Permissions per behavior level (cumulative — pick the block for the level
# you set below; the action degrades with a warning if the token lacks a
# scope, e.g. fix-pr without contents: write cannot push the fix branch):
#
#   behavior: summary
#     contents: read
#
#   behavior: comment | review
#     contents: read
#     pull-requests: write
#
#   behavior: fix-pr
#     contents: write        # push the fix branch
#     pull-requests: write   # open the stacked fix PR (also enable
#                            # "Allow GitHub Actions to create and approve
#                            # pull requests" under Settings → Actions)
permissions:
  contents: read # for behavior: fix-pr, change to `contents: write`
  pull-requests: write # comment / review / fix-pr levels

jobs:
  mcp-doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: MCP Doctor
        uses: ./ # external repos: lghiur/openapi-to-mcp-doctor@master
        with:
          behavior: comment # summary | comment | review | fix-pr
          # spec: api/openapi.yaml       # omit to auto-detect
          # route-paths: internal/api/   # files or directories; omit to auto-discover
          # fail-on: never               # PR default: advisory
          llm-base-url: ${{ secrets.LLM_BASE_URL }}
          llm-api-token: ${{ secrets.LLM_API_TOKEN }}
